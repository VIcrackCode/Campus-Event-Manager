services:
  - type: web
    name: campus-events
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/campus.db
    disk:
      name: campus-events-data
      mountPath: /var/data
      sizeGB: 1
