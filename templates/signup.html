{% extends "base.html" %}
{% block title %}Sign Up - CampusHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="auth-card p-4 p-md-5">
        <h3 class="fw-bold mb-1">Create your account</h3>
        <p class="text-muted">Join CampusHub in seconds.</p>
        <form method="post" id="signupForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" id="password" type="password" class="form-control" required>
            <small class="text-muted">Min 8 chars, uppercase, lowercase, number & special char.</small>
            <div id="pwdHint" class="small mt-1"></div>
          </div>
          <button class="btn btn-gradient w-100">Create Account</button>
        </form>
        <p class="small text-muted mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
