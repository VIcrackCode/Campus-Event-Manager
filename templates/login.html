{% extends "base.html" %}
{% block title %}Login - CampusHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="auth-card p-4 p-md-5">
        <h3 class="fw-bold mb-1">Welcome back</h3>
        <p class="text-muted">Login to access your dashboard.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required>
          </div>
          <button class="btn btn-gradient w-100">Login</button>
        </form>
        <p class="small text-muted mt-3 mb-0">No account? <a href="{{ url_for('signup') }}">Sign up</a></p>
        <p class="small text-muted mt-2 mb-0">Admin: <code>admin@campus.edu</code> / <code>Admin@123</code></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
